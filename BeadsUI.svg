<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep navy -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1A2F6B"/>
      <stop offset="100%" stop-color="#0D1B3E"/>
    </linearGradient>

    <!-- Left bead: blue -->
    <linearGradient id="b-blue" x1="0" y1="0" x2="0.6" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#5B9EF0"/>
      <stop offset="100%" stop-color="#2F72D1"/>
    </linearGradient>

    <!-- Centre bead: white/cloud -->
    <linearGradient id="b-white" x1="0" y1="0" x2="0.6" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D4E4F8"/>
    </linearGradient>

    <!-- Right bead: teal -->
    <linearGradient id="b-teal" x1="0" y1="0" x2="0.6" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#56D4AE"/>
      <stop offset="100%" stop-color="#28A882"/>
    </linearGradient>

    <!-- Soft drop shadow -->
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!-- Inner highlight on beads -->
    <radialGradient id="shine" cx="0.35" cy="0.28" r="0.6" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <!-- Subtle border highlight -->
  <rect width="512" height="512" rx="114" fill="none"
        stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <!-- Ambient inner glow -->
  <ellipse cx="256" cy="230" rx="200" ry="160"
           fill="rgba(80,130,230,0.12)"/>

  <!-- ── String / thread ── -->
  <path d="M 88 272 Q 256 205 424 272"
        fill="none"
        stroke="rgba(255,255,255,0.22)"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- ── Left bead (blue) ── -->
  <circle cx="118" cy="270" r="58" fill="url(#b-blue)" filter="url(#shadow)"/>
  <circle cx="118" cy="270" r="58" fill="url(#shine)"/>

  <!-- ── Centre bead (white, largest, higher) ── -->
  <circle cx="256" cy="222" r="76" fill="url(#b-white)" filter="url(#shadow)"/>
  <circle cx="256" cy="222" r="76" fill="url(#shine)"/>
  <!-- Plus icon on centre bead -->
  <line x1="256" y1="196" x2="256" y2="248"
        stroke="#2A6EC8" stroke-width="15" stroke-linecap="round"/>
  <line x1="230" y1="222" x2="282" y2="222"
        stroke="#2A6EC8" stroke-width="15" stroke-linecap="round"/>

  <!-- ── Right bead (teal) ── -->
  <circle cx="394" cy="270" r="58" fill="url(#b-teal)" filter="url(#shadow)"/>
  <circle cx="394" cy="270" r="58" fill="url(#shine)"/>
</svg>
